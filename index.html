// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
onAuthStateChanged(auth, async user => {
  if (user) {
    const profile = TEAM_PROFILES[user.email];
    if (!profile) { await signOut(auth); showLogin("Email not recognized."); return; }
    currentUser    = user;
    currentProfile = { ...profile, email: user.email, uid: user.uid };
    showApp();
  } else {
    currentUser    = null;
    currentProfile = null;
    showLogin();
  }
});

function showLogin(errMsg = "") {
  document.getElementById("login").style.display = "flex";
  document.getElementById("app").style.display   = "none";
  document.getElementById("login-err").textContent = errMsg;
}

async function doLogin() {
  const email = document.getElementById("l-email").value.trim();
  const pass  = document.getElementById("l-pass").value;
  document.getElementById("login-err").textContent = "";
  document.getElementById("login-btn").textContent = "Signing in...";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    document.getElementById("login-err").textContent = "Wrong email or password.";
    document.getElementById("login-btn").textContent = "Sign in";
  }
}

async function doLogout() {
  unsubs.forEach(u => u());
  unsubs = [];
  await signOut(auth);
}

function showApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display   = "flex";
  document.getElementById("sidebar-name").textContent = currentProfile.name;
  document.getElementById("sidebar-role").textContent = currentProfile.role;
  buildNav();
  go("overview");
}

function buildNav() {
  const nav = getNav(currentProfile.access);
  document.getElementById("nav-list").innerHTML = nav.map(n =>
    `<button class="nav-item" id="nav-${n.id}" onclick="go('${n.id}')">
      <span class="nav-icon">${n.icon}</span>${n.label}
    </button>`).join("");
}

function setActiveNav(id) {
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const el = document.getElementById("nav-" + id);
  if (el) el.classList.add("active");
}

window.go = function(view) {
  currentView = view;
  setActiveNav(view);
  const m = document.getElementById("main");
  m.innerHTML = `<div style="padding:2rem;color:var(--text2);font-size:13px">Loading...</div>`;
  const views = {
    overview:   renderOverview,
    allTasks:   renderAllTasks,
    tasks:      renderMyTasks,
    content:    renderContentHub,
    team:       renderTeam,
    timeoff:    renderTimeOff,
    goals:      renderGoals,
    financials: renderFinancials,
    analytics:  renderAnalytics,
    updates:    renderUpdates,
    links:      renderLinks,
    sales:      renderSalesBoard,
    settings:   renderSettings,
  };
  if (views[view]) views[view]();
  else m.innerHTML = `<div class="page-title">${view}</div><p style="color:var(--text2)">Coming soon</p>`;
};

const isAdmin    = () => ADMIN_ACCESS.includes(currentProfile?.access);
const isFinance  = () => FINANCE_ACCESS.includes(currentProfile?.access);
const profileOf  = email => Object.values(TEAM_PROFILES).find(p => p.name === email) || {color:"var(--bg2)",tc:"var(--text2)",init:"?"};
const initials   = name  => name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
function avatar(name, size=26) {
  const p = profileOf(name); const fs = Math.round(size*0.38);
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px;background:${p.color};color:${p.tc}">${initials(name)}</div>`;
}
function badge(cls, label) { return `<span class="badge ${cls}">${label}</span>`; }
function empty(msg)        { return `<div class="empty">${msg}</div>`; }
function fmtDate(d)        { if(!d) return "TBD"; return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2800);
}
function setMain(html) { document.getElementById("main").innerHTML = html; }

          <div class="task-body"><div class="task-name">${t.text}</div>
          <div class="task-sub">${t.assignee} · due ${fmtDate(t.due)}</div></div>

let taskModalMode = "new";
let editTaskId    = null;

window.openTaskModal = function(taskId=null) {
  taskModalMode = taskId ? "edit" : "new";
  editTaskId    = taskId;
  document.getElementById("tm-title").textContent = taskId ? "Edit task" : "New task";
  document.getElementById("tm-name").value  = "";
  document.getElementById("tm-notes").value = "";
  document.getElementById("tm-due").value   = "";
  document.getElementById("tm-recur").value = "none";
  document.getElementById("tm-pri").value   = "med";
  document.getElementById("tm-who").innerHTML = Object.values(TEAM_PROFILES).map(p=>
    `<option value="${p.name}">${p.name} — ${p.role}</option>`).join("");
  if (taskId) {
    getDoc(doc(db,"tasks",taskId)).then(d => {
      const t = d.data();
      document.getElementById("tm-name").value  = t.text||"";
      document.getElementById("tm-notes").value = t.notes||"";
      document.getElementById("tm-due").value   = t.due||"";
      document.getElementById("tm-recur").value = t.recur||"none";
      document.getElementById("tm-pri").value   = t.pri||"med";
      document.getElementById("tm-who").value   = t.assignee||"";
    });
  }
  document.getElementById("task-modal").style.display = "flex";
};

window.closeTaskModal = function() {
  document.getElementById("task-modal").style.display = "none";
};

window.saveTask = async function() {
  const text     = document.getElementById("tm-name").value.trim(); if(!text) return;
  const assignee = document.getElementById("tm-who").value;
  const pri      = document.getElementById("tm-pri").value;
  const due      = document.getElementById("tm-due").value;
  const recur    = document.getElementById("tm-recur").value;
  const notes    = document.getElementById("tm-notes").value.trim();
  const data = { text, assignee, pri, due, recur, notes, done:false,
    updatedAt: serverTimestamp(),
    updatedBy: currentProfile.name };
  if (taskModalMode === "edit" && editTaskId) {
    await updateDoc(doc(db,"tasks",editTaskId), data);
    toast("Task updated ✓");
  } else {
    data.createdAt  = serverTimestamp();
    data.createdBy  = currentProfile.name;
    data.subtasks   = [];
    data.completedDates = [];
    await addDoc(collection(db,"tasks"), data);
    toast("Task created ✓");
  }
  closeTaskModal();
  go(currentView);
};

window.openTemplateModal = function() {
  document.getElementById("template-modal").style.display = "flex";
  document.getElementById("tmpl-list").innerHTML = Object.keys(TASK_TEMPLATES).map(k=>
    `<div class="tmpl-item" onclick="applyTemplate('${k}')">
      <div style="font-size:13px;font-weight:500">${k}</div>
      <div style="font-size:11px;color:var(--text2)">${TASK_TEMPLATES[k].length} steps</div>
    </div>`).join("");
};

window.closeTemplateModal = function() {
  document.getElementById("template-modal").style.display = "none";
};

window.applyTemplate = async function(name) {
  const steps = TASK_TEMPLATES[name];
  const assignee = document.getElementById("tm-who")?.value || currentProfile.name;
  for (const step of steps) {
    await addDoc(collection(db,"tasks"), {
      text: step, assignee, pri:"med", due:"", recur:"none", notes:"",
      done:false, subtasks:[], completedDates:[],
      templateName: name, createdAt: serverTimestamp(), createdBy: currentProfile.name,
    });
  }
  closeTemplateModal(); closeTaskModal();
  toast(`${steps.length} tasks created from "${name}" template ✓`);
  go(currentView);
};

window.toggleTask = async function(id, recur) {
  const ref  = doc(db,"tasks",id);
  const snap = await getDoc(ref);
  const t    = snap.data();
  const now  = new Date().toISOString().split("T")[0];
  const newDone = !t.done;
  const dates = t.completedDates||[];
  if (newDone) dates.push(now);
  await updateDoc(ref,{done:newDone, completedDates:dates, updatedAt:serverTimestamp()});
  if (newDone && recur && recur!=="none") {
    const base = new Date(t.due||now);
    if(recur==="daily")   base.setDate(base.getDate()+1);
    if(recur==="weekly")  base.setDate(base.getDate()+7);
    if(recur==="monthly") base.setMonth(base.getMonth()+1);
    const newDue = base.toISOString().split("T")[0];
    await addDoc(collection(db,"tasks"),{...t, done:false, due:newDue,
      completedDates:[], createdAt:serverTimestamp(), createdBy:"system"});
    toast(`↻ Recurring task created for ${fmtDate(newDue)}`);
  } else toast(newDone ? "Task done ✓" : "Task reopened");
  go(currentView);
};

  const prompt = type==="short"

    : `Write a YouTube long-form video script in Jaz Bautista's style for Latino immigrants learning investing. Topic: ${topic}. Include intro hook, main sections, and CTA.`;

  <div class="card">

      <button class="btn primary" onclick="openFinancialModal()">+ Add entry</button></div>
    ${items.length ? items.map(i=>`
      <div class="pay-row">
        <span style="font-size:18px">${i.type==="revenue"?"💚":i.type==="payroll"?"💛":"🔴"}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${i.label||i.type}</div>
          <div style="font-size:11px;color:var(--text2)">${i.type} · ${fmtDate(i.date)} ${i.note?`· ${i.note}`:""}</div></div>
        <span style="font-size:14px;font-weight:600;color:${i.type==="revenue"?"var(--green)":"var(--red)"}">${i.type==="revenue"?"+":"-"}$${(i.amount||0).toLocaleString()}</span>
        ${isAdmin()?`<button class="icon-btn" onclick="deleteFinancial('${i.id}')">🗑</button>`:""}
      </div>`).join("") : empty("No entries yet — add revenue, payroll, and expenses")}
  </div>`);
}

window.openFinancialModal = function() {
  const modal = document.createElement("div");
  modal.className = "modal-overlay"; modal.id = "fin-modal";
  modal.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
    <h3>Add financial entry</h3>
    <div class="modal-row"><label>Type</label><select id="fn-type"><option value="revenue">Revenue</option><option value="payroll">Payroll</option><option value="expense">Expense</option></select></div>
    <div class="modal-row"><label>Label</label><input type="text" id="fn-label" placeholder="e.g. High-ticket sales, Alli salary, Software tool"/></div>
    <div class="modal-row"><label>Amount ($)</label><input type="number" id="fn-amount" min="0" placeholder="0"/></div>
    <div class="modal-row"><label>Date</label><input type="date" id="fn-date"/></div>
    <div class="modal-row"><label>Note (optional)</label><input type="text" id="fn-note" placeholder="Any context..."/></div>
    <div class="modal-btns">
      <button class="btn" onclick="document.getElementById('fin-modal').remove()">Cancel</button>
      <button class="btn primary" onclick="saveFinancial()">Save</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
};

window.saveFinancial = async function() {
  const amount = parseFloat(document.getElementById("fn-amount").value); if(!amount) return;
  await addDoc(collection(db,"financials"),{
    type:   document.getElementById("fn-type").value,
    label:  document.getElementById("fn-label").value.trim(),
    amount, date: document.getElementById("fn-date").value,
    note:   document.getElementById("fn-note").value.trim(),
    createdAt: serverTimestamp(), createdBy: currentProfile.name,
  });
  document.getElementById("fin-modal")?.remove();
  toast("Entry saved ✓"); renderFinancials();
};

window.deleteFinancial = async function(id) {
  if (!confirm("Delete this entry?")) return;
  await deleteDoc(doc(db,"financials",id));
  toast("Deleted"); renderFinancials();
};

// ANALYTICS
// ══════════════════════════════════════════════
async function renderAnalytics() {
  const snap = await getDocs(collection(db,"tasks"));
  const tasks = snap.docs.map(d=>({id:d.id,...d.data()}));
  const members = Object.values(TEAM_PROFILES);
  const today = new Date().toISOString().split("T")[0];

  setMain(`
  <div class="page-title">Analytics</div>
  <div class="metrics">
    <div class="metric"><div class="ml">Total tasks</div><div class="mv">${tasks.length}</div></div>
    <div class="metric"><div class="ml">Completed</div><div class="mv" style="color:var(--green)">${tasks.filter(t=>t.done).length}</div></div>
    <div class="metric"><div class="ml">Open</div><div class="mv" style="color:var(--amber)">${tasks.filter(t=>!t.done).length}</div></div>
    <div class="metric"><div class="ml">Completion rate</div><div class="mv">${tasks.length?Math.round(tasks.filter(t=>t.done).length/tasks.length*100):0}%</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-head"><div class="card-title">Productivity per member</div></div>
      ${members.map(m=>{
        const total = tasks.filter(t=>t.assignee===m.name).length;
        const done  = tasks.filter(t=>t.assignee===m.name&&t.done).length;
        const open  = total - done;
        const pct   = total ? Math.round(done/total*100) : 0;
        return `<div style="padding:8px 0;border-bottom:0.5px solid var(--border)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            <div class="avatar" style="width:24px;height:24px;font-size:9px;background:${m.color};color:${m.tc}">${m.init}</div>
            <span style="font-size:13px;font-weight:500;flex:1">${m.name}</span>
            <span style="font-size:11px;color:var(--text2)">${done}/${total} done</span>
            <span style="font-size:11px;font-weight:600;color:${pct>=70?"var(--green)":pct>=40?"var(--amber)":"var(--red)"}">${pct}%</span>
          </div>
          <div class="track"><div class="fill ${pct>=70?"g":pct>=40?"a":"r"}" style="width:${pct}%"></div></div>
        </div>`;}).join("")}
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Tasks by priority</div></div>
      ${["high","med","low"].map(p=>{
        const count = tasks.filter(t=>t.pri===p).length;
        const done  = tasks.filter(t=>t.pri===p&&t.done).length;
        return `<div class="sales-row">
          ${badge(p,p)}
          <span style="flex:1;font-size:13px;margin-left:8px">${count} tasks</span>
          <span style="font-size:12px;color:var(--text2)">${done} done</span>
        </div>`;}).join("")}
      <div style="margin-top:16px">
        <div class="card-title" style="margin-bottom:10px">Content pipeline</div>
        <div id="pipeline-stats">Loading...</div>
      </div>
    </div>
  </div>`);

  // Content stats
  const csnap = await getDocs(collection(db,"content"));
  const content = csnap.docs.map(d=>d.data());
  const pipelineEl = document.getElementById("pipeline-stats");
  if (pipelineEl) {
    pipelineEl.innerHTML = CONTENT_STAGES.map(s=>{
      const n = content.filter(c=>c.stage===s).length;
      return `<div class="sales-row"><span style="flex:1;font-size:12px">${s}</span>
        <span style="font-size:12px;font-weight:600;color:var(--text2)">${n}</span></div>`;
    }).join("");
  }
}

  setMain(`

      ${ann.map(a=>`<div class="announce">

      </div>`).join("")||empty("No updates yet")}

window.postUpdate = async function() {

};

  setMain(`

    ${DEFAULT_LINKS.map((l,i)=>`

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

}}

.team-row,.pay-row,.off-req,.sales-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.team-row:last-child,.pay-row:last-child,.off-req:last-child,.sales-row:last-child{border-bottom:none}
.date-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.date-inputs label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px}
.date-inputs input{width:100%;font-size:12px;padding:7px 9px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);outline:none}
.announce{background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:8px;border-left:3px solid var(--border2)}
.announce-title{font-size:13px;font-weight:500;margin-bottom:2px}
.announce-meta{font-size:11px;color:var(--text2)}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.link-card{background:var(--bg2);border-radius:var(--r);padding:14px;border:0.5px solid var(--border);display:block;transition:all .15s}
.link-card:hover{background:var(--bg);border-color:var(--border2);transform:translateY(-1px)}
.link-icon{font-size:20px;margin-bottom:6px}
.link-name{font-size:13px;font-weight:600}
.link-desc{font-size:11px;color:var(--text2);margin-top:1px}
.goal-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.goal-row:last-child{border-bottom:none}
.track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.fill{height:100%;border-radius:3px}
.fill.g{background:var(--green)}.fill.a{background:var(--amber)}.fill.r{background:var(--red)}
.up{color:var(--green);font-size:11px;font-weight:600}
.dn{color:var(--red);font-size:11px;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg);border-radius:var(--rl);padding:1.5rem;width:460px;max-width:95vw;border:0.5px solid var(--border2);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.modal-row{margin-bottom:12px}
.modal-row label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.modal-row input,.modal-row select,.modal-row textarea{width:100%;font-size:13px;padding:8px 10px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);outline:none}
.modal-row textarea{min-height:70px;resize:vertical}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.tmpl-item{padding:10px;border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .12s}
.tmpl-item:hover{background:var(--bg2);border-color:var(--border2)}

/* AI MODAL */
#ai-result{margin-top:12px;font-size:12px;white-space:pre-wrap;background:var(--bg2);border-radius:var(--r);padding:12px;min-height:80px;max-height:300px;overflow-y:auto;color:var(--text)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">⚡ OpsHQ</div>
    <div class="login-sub">Inversiones Para Latinos — Team Portal</div>
    <div class="login-field"><label>Email</label><input type="email" id="l-email" placeholder="you@inversiones.com" autocomplete="email"/></div>
    <div class="login-field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/></div>
    <button id="login-btn" onclick="doLogin()">Sign in</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">⚡ OpsHQ</div>
      <div class="sidebar-uinfo">
        <div class="sidebar-uname" id="sidebar-name"></div>
        <div class="sidebar-urole" id="sidebar-role"></div>
      </div>
    </div>
    <div class="nav-list" id="nav-list"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">← Sign out</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal" style="display:none" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="tm-title">New task</h3>
    <div class="modal-row"><label>Task name</label><input type="text" id="tm-name" placeholder="What needs to be done?"/></div>
    <div class="modal-row"><label>Assign to</label><select id="tm-who"></select></div>
    <div class="modal-row"><label>Priority</label>
      <select id="tm-pri"><option value="high">🔴 High</option><option value="med" selected>🟡 Med</option><option value="low">🟢 Low</option></select></div>
    <div class="modal-row"><label>Due date</label><input type="date" id="tm-due"/></div>
    <div class="modal-row"><label>Recurring</label>
      <select id="tm-recur"><option value="none">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div>
    <div class="modal-row"><label>Notes</label><textarea id="tm-notes" placeholder="Any context..."></textarea></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeTaskModal()">Cancel</button>
      <button class="btn" onclick="openTemplateModal()">📋 Use template</button>
      <button class="btn primary" onclick="saveTask()">Save task</button>
    </div>
  </div>
</div>

<!-- TEMPLATE MODAL -->
<div class="modal-overlay" id="template-modal" style="display:none" onclick="if(event.target===this)closeTemplateModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Choose a template</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px">This will create all steps as individual tasks assigned to the selected person.</p>
    <div id="tmpl-list"></div>
    <div class="modal-btns"><button class="btn" onclick="closeTemplateModal()">Cancel</button></div>
  </div>
</div>

<!-- CONTENT MODAL -->
<div class="modal-overlay" id="content-modal" style="display:none" onclick="if(event.target===this)closeContentModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>New content idea</h3>
    <div class="modal-row"><label>Title / idea</label><input type="text" id="cm-title" placeholder="e.g. Lo que tu banco NO quiere que sepas..."/></div>
    <div class="modal-row"><label>Stage</label>
      <select id="cm-stage">${CONTENT_STAGES.map(s=>`<option>${s}</option>`).join("")}</select></div>
    <div class="modal-row"><label>Type</label>
      <select id="cm-type">${CONTENT_TYPES.map(t=>`<option>${t}</option>`).join("")}</select></div>
    <div class="modal-row"><label>Assignee</label><select id="cm-assignee"></select></div>
    <div class="modal-row"><label>Notes / inspiration link</label><textarea id="cm-notes" placeholder="Any context, inspiration URLs, notes..."></textarea></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeContentModal()">Cancel</button>
      <button class="btn primary" onclick="saveContent()">Add idea</button>
    </div>
  </div>
</div>

<!-- AI SCRIPT MODAL -->
<div class="modal-overlay" id="ai-modal" style="display:none" onclick="if(event.target===this)closeAIModal()">
  <div class="modal" style="width:560px" onclick="event.stopPropagation()">
    <h3>🤖 AI Script Generator</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Uses Jaz's script style & voice. Enter a topic and get a ready-to-record script.</p>
    <div class="modal-row"><label>Topic / idea</label><input type="text" id="ai-topic" placeholder="e.g. Cómo invertir con $500 siendo inmigrante"/></div>
    <div class="modal-row"><label>Format</label>
      <select id="ai-type"><option value="short">Short-form (60-90s Reel/TikTok)</option><option value="long">Long-form (YouTube)</option></select></div>
    <button class="btn primary" style="width:100%;margin-bottom:4px" onclick="generateScript()">Generate script</button>
    <div id="ai-result"></div>
    <div class="modal-btns" style="margin-top:8px">
      <button class="btn" onclick="closeAIModal()">Close</button>
      <button class="btn primary" onclick="navigator.clipboard.writeText(document.getElementById('ai-result').textContent).then(()=>toast('Copied!'))">Copy script</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// Populate content assignee dropdown after page loads
document.addEventListener("DOMContentLoaded", () => {
  const sel = document.getElementById("cm-assignee");
  if (sel && typeof TEAM_PROFILES !== "undefined") {
    sel.innerHTML = Object.values(TEAM_PROFILES).map(p=>`<option value="${p.name}">${p.name}</option>`).join("");
  }
});
</script>
</body>
</html>
